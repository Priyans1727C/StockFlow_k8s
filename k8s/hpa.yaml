apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: stockflow-hpa
  namespace: stockflow
  labels:
    app: stockflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: stockflow
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
