apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: stockflow
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - stockflow
  selector:
    matchLabels:
      app: stockflow
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s