apiVersion: v1
kind: ConfigMap
metadata:
  name: stockflow-nginx-config
  namespace: stockflow
  labels:
    app: stockflow
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      location = /stub_status {
        stub_status;
        allow 127.0.0.1;
        deny all;
      }

      location = /env-config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        expires off;
      }

      location / {
        try_files $uri $uri/ /index.html;
      }
    }